name: 获取 36kr 融资快讯

on:
  schedule:
    # 每天 06:00 和 18:00 运行 (UTC 时间，北京时间需 +8)
    - cron: '0 22,10 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  fetch-and-generate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml

    - name: Fetch RSS and generate report
      run: |
        python scripts/generate_report.py
      env:
        RSS_URL: ${{ secrets.RSS_URL || 'http://localhost:5000/rss' }}

    - name: Upload report artifact
      uses: actions/upload-artifact@v4
      with:
        name: daily-report
        path: reports/
        retention-days: 30
