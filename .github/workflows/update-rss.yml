name: 更新 36kr 融资快讯 RSS

on:
  schedule:
    # 北京时间 07:00 / 12:00 / 24:00
    - cron: '0 23 * * *'   # 07:00 CST
    - cron: '0 4 * * *'    # 12:00 CST
    - cron: '0 16 * * *'   # 24:00 CST
  workflow_dispatch:  # 支持手动触发
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 lxml

    - name: Fetch RSS data
      run: |
        python fetch_rss.py

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './public'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
